name: Weekly NBA data refresh

# Re-runs the live NBA Stats pipeline weekly during the season and commits the
# updated JSON. The deploy workflow then redeploys automatically on the push.
# stats.nba.com black-holes some datacenter IPs — if the live fetch fails the
# step falls back to regenerating the committed seed dataset so the site is
# never left without data.
on:
  schedule:
    - cron: "0 12 * * 2" # Tuesdays 12:00 UTC — after Monday night's games
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh data from the live NBA Stats API
        # If the runner's IP is rate-limited/blocked, keep the committed dataset
        # rather than overwriting it (the pipeline only writes on full success).
        run: npm run data || echo "Live refresh failed — keeping the committed dataset."
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --staged --quiet || git commit -m "data: weekly NBA refresh"
          git push
